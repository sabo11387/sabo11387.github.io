<script>
function updateTime() {
  const now = new Date();
  const time = now.toLocaleTimeString();
  const date = now.toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
  const day = now.toLocaleDateString(undefined, { weekday: 'long' });
  document.getElementById('time').textContent = time;
  document.getElementById('date').textContent = date;
  document.getElementById('day').textContent = day;
}
setInterval(updateTime, 1000);
updateTime();
</script>

<script>
function openTab(evt, tabName) {
  const tabs = document.getElementsByClassName("tabcontent");
  for (let i=0; i<tabs.length; i++) tabs[i].style.display="none";
  const links = document.getElementsByClassName("tablinks");
  for (let i=0; i<links.length; i++) links[i].classList.remove("active");
  document.getElementById(tabName).style.display = "block";
  evt.currentTarget.classList.add("active");
}
</script>

<script>
document.getElementById('profileForm').addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('name').value;
  const link = document.getElementById('link').value;
  if (!name) return;
  let profiles = JSON.parse(localStorage.getItem('profiles')) || [];
  profiles.push({ name, link });
  localStorage.setItem('profiles', JSON.stringify(profiles.slice(-40)));
  displayProfiles();
  displayGreeting();
  e.target.reset();
});

function displayProfiles() {
  const div = document.getElementById('profileLinks');
  div.innerHTML = '';
  const profiles = JSON.parse(localStorage.getItem('profiles')) || [];
  profiles.forEach(p => {
    const el = document.createElement('div');
    el.className = 'profile-link';
    el.innerHTML = `🔹 <a href="${p.link}${p.name}/latest" target="_blank">${p.name}</a>`;
    div.appendChild(el);
  });
}
window.onload = displayProfiles;
</script>
